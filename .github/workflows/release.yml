name: Release

# Builds and publishes installers for Linux, Windows and macOS.
#
# Trigger by pushing a tag like `v0.1.0`, or run manually from the Actions tab
# (optionally enabling the store packages — AUR / winget — which need the
# secrets documented on each job).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish_extras:
        description: "Also publish to AUR / Winget (needs store secrets)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Read the canonical version from package.json so every downstream job uses
  # the same string without re-parsing the file.
  # ---------------------------------------------------------------------------
  version:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.read.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: read
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

  # ---------------------------------------------------------------------------
  # Core: deb + rpm + AppImage (Linux), msi + nsis (Windows), dmg + .app (macOS).
  # Produced and uploaded to a draft GitHub Release by tauri-action.
  # ---------------------------------------------------------------------------
  desktop:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # Intel
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04 # deb / rpm / AppImage (x86_64)
            args: ""
          - platform: ubuntu-24.04-arm # deb / rpm / AppImage (arm64), native runner — GTK/WebKit
            args: "" # cross-compiling those isn't practical, see GH's arm64 runner GA (2025-08)
          - platform: windows-latest # msi / nsis
            args: ""
    runs-on: ${{ matrix.platform }}
    # Hoisted to job level so the signing steps' `if: env.X != ''` guards can
    # see them — a step-level `env:` isn't in scope when that step's own `if:`
    # is evaluated, so signing would never trigger otherwise.
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-24.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      # Signing is opt-in: these steps no-op until APPLE_CERTIFICATE /
      # WINDOWS_CERTIFICATE secrets exist, so the build stays unsigned (ad-hoc
      # on macOS, unsigned on Windows) exactly as it does today otherwise.
      - name: Import Apple Developer certificate
        if: matrix.platform == 'macos-latest' && env.APPLE_CERTIFICATE != ''
        env:
          # APPLE_CERTIFICATE is defined at job level (for the `if:` guard).
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          CERT_ID=$(security find-identity -v -p codesigning build.keychain | grep -o '"[^"]*"' | head -1 | tr -d '"')
          # Only the *signing* path is enabled here. Passing these to the build
          # step's env only when a real cert exists is what keeps the unsigned
          # build from tripping tauri-bundler's `security import` on empty vars.
          {
            echo "CERT_ID=$CERT_ID"
            echo "APPLE_CERTIFICATE=$APPLE_CERTIFICATE"
            echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD"
            echo "APPLE_ID=$APPLE_ID"
            echo "APPLE_PASSWORD=$APPLE_PASSWORD"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
          } >> "$GITHUB_ENV"

      - name: Import Windows certificate
        if: matrix.platform == 'windows-latest' && env.WINDOWS_CERTIFICATE != ''
        env:
          # WINDOWS_CERTIFICATE is defined at job level (for the `if:` guard).
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          New-Item -ItemType directory -Path certificate
          Set-Content -Path certificate/tempCert.txt -Value $env:WINDOWS_CERTIFICATE
          certutil -decode certificate/tempCert.txt certificate/certificate.pfx
          Remove-Item -Path certificate/tempCert.txt
          $securePassword = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
          Import-PfxCertificate -FilePath certificate/certificate.pfx -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword
          # tauri-bundler needs the thumbprint in tauri.windows.conf.json itself
          # (no env-var override exists for it, unlike the macOS signing identity).
          $thumbprint = (Get-PfxCertificate -FilePath certificate/certificate.pfx -Password $securePassword).Thumbprint
          $configPath = "src-tauri/tauri.windows.conf.json"
          $json = Get-Content $configPath -Raw | ConvertFrom-Json
          $json.bundle.windows | Add-Member -NotePropertyName certificateThumbprint -NotePropertyValue $thumbprint -Force
          $json | ConvertTo-Json -Depth 10 | Set-Content $configPath

      # tauri-action only takes the release body as a literal string
      # (`releaseBody`), not a file path, so per-release notes written to
      # release/notes/<tag>.md are read here and passed through as a
      # multiline step output. Falls back to a generic line if a tag doesn't
      # have a notes file yet, so untagged/ad-hoc releases don't fail the job.
      - name: Read release notes
        id: notes
        shell: bash
        run: |
          notes_file="release/notes/${{ github.ref_name }}.md"
          {
            echo 'body<<ZW_RELEASE_NOTES_EOF'
            if [ -f "$notes_file" ]; then
              cat "$notes_file"
            else
              echo "See the assets below to download and install ZeroWhats."
            fi
            echo ZW_RELEASE_NOTES_EOF
          } >> "$GITHUB_OUTPUT"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing. tauri-bundler enters its certificate-import path when
          # APPLE_CERTIFICATE is merely *present* in the env (it reads it with
          # `var_os`, so an empty string still counts) — importing an empty cert
          # fails with "SecKeychainItemImport: parameters were not valid". So we
          # must NOT define APPLE_CERTIFICATE / APPLE_* here at all when there's
          # no cert. The gated "Import Apple Developer certificate" step above
          # injects them (and CERT_ID) into $GITHUB_ENV *only* when the secret
          # exists. In the unsigned case none of them are set, and we sign
          # **ad-hoc** via APPLE_SIGNING_IDENTITY="-" — no keychain import, and
          # ad-hoc is required for the .app to launch on Apple Silicon anyway.
          APPLE_SIGNING_IDENTITY: ${{ env.CERT_ID || '-' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ZeroWhats ${{ github.ref_name }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          # Published (not draft): winget downloads these assets by public
          # URL right after this job, and draft-release assets 404 on an
          # unauthenticated fetch — which is exactly what broke it.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # ---------------------------------------------------------------------------
  # AUR — publishes release/aur/PKGBUILD to the AUR. Needs the AUR_SSH_PRIVATE_KEY
  # secret (the deploy key registered on your AUR account).
  # ---------------------------------------------------------------------------
  aur:
    needs: [version, desktop]
    if: (github.event_name == 'push' || inputs.publish_extras) && !contains(github.ref_name, '-')
    runs-on: ubuntu-22.04
    # Hoisted to job level so the `if: env.AUR_KEY != ''` guard can see it.
    env:
      AUR_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Update PKGBUILD version
        run: |
          sed -i "s/^pkgver=.*/pkgver=${{ needs.version.outputs.version }}/" \
            release/aur/PKGBUILD

      - name: Publish to the AUR
        if: env.AUR_KEY != ''
        uses: KSXGitHub/github-actions-deploy-aur@v3
        with:
          pkgname: zerowhats-bin
          pkgbuild: release/aur/PKGBUILD
          commit_username: ${{ github.actor }}
          commit_email: zaujulio.dev@gmail.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ github.ref_name }}"

  # ---------------------------------------------------------------------------
  # Winget — submits updated manifests to microsoft/winget-pkgs via a PR.
  # Needs the WINGET_TOKEN secret: a GitHub PAT with fork write access on
  # microsoft/winget-pkgs (wingetcreate forks the repo and opens the PR).
  # Only runs on stable releases (no pre-release tags like v1.0.0-beta).
  # ---------------------------------------------------------------------------
  winget:
    needs: [version, desktop]
    if: (github.event_name == 'push' || inputs.publish_extras) && !contains(github.ref_name, '-')
    runs-on: windows-latest
    # Hoisted to job level so the `if: env.WINGET_TOKEN != ''` guard can see it.
    env:
      WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Submit to Windows Package Manager
        if: env.WINGET_TOKEN != ''
        shell: pwsh
        run: |
          $version = "${{ needs.version.outputs.version }}"
          $tag     = "${{ github.ref_name }}"
          $base    = "https://github.com/ZauJulio/ZeroWhats/releases/download/$tag"
          $msi     = "$base/ZeroWhats_${version}_x64_en-US.msi"
          $exe     = "$base/ZeroWhats_${version}_x64-setup.exe"
          iwr https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

          # Try `update` first (package already registered in winget-pkgs).
          # Falls back to `new` for the very first release.
          $exitCode = 0
          .\wingetcreate.exe update ZauJulio.ZeroWhats `
            --version $version `
            --urls $msi $exe `
            --submit `
            --token $env:WINGET_TOKEN
          $exitCode = $LASTEXITCODE

          if ($exitCode -ne 0) {
            # First-ever submission of a brand-new package. Automating this
            # reliably is a known pain: `wingetcreate new --submit` needs to fork
            # microsoft/winget-pkgs and the first PR is moderator-reviewed. Rather
            # than fail the whole release on it, generate the manifests locally
            # and surface them as an artifact so the maintainer can submit the
            # first version by hand; subsequent releases use the `update` path
            # above, which works unattended.
            Write-Host "Package not yet in winget-pkgs — generating manifests for a manual first submission."
            # --id avoids the interactive package-identifier prompt (Sharprompt
            # needs a TTY, which CI doesn't have, and would otherwise crash with
            # "Sharprompt requires an interactive environment"). Other optional
            # fields without a default may still prompt; if this ever crashes for
            # that reason, the fix is to run `wingetcreate new` locally once to
            # produce a full manifest, then let `update` above take over for
            # every release after.
            .\wingetcreate.exe new $msi $exe --id ZauJulio.ZeroWhats --out manifests --token $env:WINGET_TOKEN

            # wingetcreate can emit a different `ManifestVersion:` in each of the
            # three multi-file manifests, which fails validation with
            # `InconsistentMultiFileManifestFieldValue (ManifestVersion)`. Force
            # them all to match the version manifest (the `.yaml` without an
            # `.installer`/`.locale` infix).
            $yamls = Get-ChildItem manifests -Recurse -Filter *.yaml
            $verManifest = $yamls | Where-Object {
              $_.Name -notmatch '\.installer\.yaml$' -and $_.Name -notmatch '\.locale\.'
            } | Select-Object -First 1
            if ($verManifest) {
              $mv = (Select-String -Path $verManifest.FullName -Pattern '^ManifestVersion:\s*(.+)$').Matches[0].Groups[1].Value.Trim()
              Write-Host "Normalizing ManifestVersion to '$mv' across manifests."
              foreach ($f in $yamls) {
                (Get-Content $f.FullName) `
                  -replace '^ManifestVersion:\s*.+$', "ManifestVersion: $mv" `
                  | Set-Content $f.FullName
              }
            }
            Write-Host "::notice::winget: first-time package — submit ./manifests manually (see job artifact)."
          }

      - name: Upload winget manifests for manual first submission
        if: env.WINGET_TOKEN != '' && hashFiles('manifests/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: winget-manifests
          path: manifests/
