name: zerowhats
base: core22
version: "1.0.0"
summary: A privacy-first WhatsApp Web desktop client
description: |
  ZeroWhats is a minimalist, privacy-first WhatsApp Web desktop client for
  Linux: native notifications, an app lock with optional auto-lock on
  inactivity, and an unread-message counter on the tray icon. No telemetry.
grade: stable
confinement: strict
license: MIT
# Paths are relative to this file's directory (release/snap), so the repo root
# is two levels up. Build the snap from here: `snapcraft` inside release/snap.
icon: ../../src-tauri/icons/128x128.png

apps:
  zerowhats:
    command: usr/bin/zerowhats
    # The Tauri .deb ships this file CamelCased (ZeroWhats.desktop), so the path
    # must match exactly or the launcher won't register.
    desktop: usr/share/applications/ZeroWhats.desktop
    extensions: [gnome]
    plugs:
      - home
      - network
      - network-status
      - browser-support
      - audio-playback
      - password-manager-service

parts:
  zerowhats:
    # Don't rebuild the whole app inside the snap sandbox — that recompiled all
    # of Rust + the frontend (and fetched bun via `curl | bash`) inside a
    # confined LXD build, which was slow and could hang for 20+ minutes. The
    # `desktop` CI job already produces the .deb and, because `snap` needs
    # [version, desktop], it is published to the release before this runs. So we
    # just download that published .deb and unpack it — the build takes seconds
    # and can't stall on an in-sandbox toolchain fetch.
    #
    # The URL carries the literal version because snapcraft does NOT expand env
    # vars in scriptlets' network calls reliably across bases; the release
    # workflow keeps `version:` above and this URL in sync via sed on each tag.
    plugin: nil
    source: .
    build-packages:
      - dpkg
      - curl
      - ca-certificates
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libayatana-appindicator3-1
    override-build: |
      VERSION="$(craftctl get version)"
      URL="https://github.com/ZauJulio/ZeroWhats/releases/download/v${VERSION}/ZeroWhats_${VERSION}_amd64.deb"
      curl -fSL --retry 5 --retry-delay 5 -o app.deb "$URL"
      dpkg-deb -x app.deb "$CRAFT_PART_INSTALL"
