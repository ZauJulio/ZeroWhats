name: zerowhats
base: core22
version: "1.0.0"
summary: A privacy-first WhatsApp Web desktop client
description: |
  ZeroWhats is a minimalist, privacy-first WhatsApp Web desktop client for
  Linux: native notifications, an app lock with optional auto-lock on
  inactivity, and an unread-message counter on the tray icon. No telemetry.
grade: stable
confinement: strict
license: MIT
# Paths are relative to this file's directory (release/snap), so the repo root
# is two levels up. Build the snap from here: `snapcraft` inside release/snap.
icon: ../../src-tauri/icons/128x128.png

apps:
  zerowhats:
    command: usr/bin/zerowhats
    desktop: usr/share/applications/zerowhats.desktop
    extensions: [gnome]
    plugs:
      - home
      - network
      - network-status
      - browser-support
      - audio-playback
      - password-manager-service

parts:
  zerowhats:
    plugin: nil
    source: ../..
    build-snaps:
      - rustup
    build-packages:
      - libwebkit2gtk-4.1-dev
      - libgtk-3-dev
      - libayatana-appindicator3-dev
      - librsvg2-dev
      - patchelf
      - libssl-dev
      - curl
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libayatana-appindicator3-1
    override-build: |
      rustup default stable
      curl -fsSL https://bun.sh/install | bash
      export PATH="$HOME/.bun/bin:$PATH"
      bun install --frozen-lockfile
      bun run tauri build -- --bundles deb
      # Unpack the freshly built .deb into the snap's install tree.
      dpkg-deb -x src-tauri/target/release/bundle/deb/*.deb "$CRAFT_PART_INSTALL"
