id: com.zaujulio.zerowhats
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node22
command: zerowhats
separate-locales: false

finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --socket=pulseaudio
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=xdg-download
  # Share the host runtime dir where the tray backend writes its icon PNG, so
  # the absolute path it advertises to GNOME Shell resolves (else "…" shows).
  - --filesystem=xdg-run/tray-icon:create
  # Where the notification avatar PNG is written; shared with the host at the
  # same path so the notification daemon can read it (else no sender photo).
  - --filesystem=xdg-run/zerowhats:create
  # WebKitGTK 2.44 (GNOME 48) nests its own bubblewrap sandbox inside Flatpak's;
  # the inner sandbox blocks the IPC that Tauri's `tauri://localhost` custom URI
  # scheme handler relies on, so the frameless React windows (Settings/About/
  # Shortcuts) fail to load with "Could not connect to localhost". Disabling the
  # redundant inner sandbox — Flatpak already confines the process — restores it.
  - --env=WEBKIT_DISABLE_SANDBOX_THIS_IS_DANGEROUS=1

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node22/bin
  env:
    CARGO_HOME: /run/build/zerowhats/cargo
    npm_config_cache: /run/build/zerowhats/flatpak-node/npm-cache
    XDG_CACHE_HOME: /run/build/zerowhats/flatpak-node/cache

modules:
  # ── Tray icon runtime dependencies ───────────────────────────────────────────
  - name: intltool
    buildsystem: autotools
    sources:
      - type: archive
        url: https://launchpad.net/intltool/trunk/0.51.0/+download/intltool-0.51.0.tar.gz
        sha256: 67c74d94196b153b774ab9f89b2fa6c6ba79352407037c8c14d5aeb334e959cd

  - name: libdbusmenu
    buildsystem: simple
    build-options:
      cflags: "-Wno-error"
      env:
        # Bypass the GTK2 pkg-config check for the dumper tool (not needed at runtime).
        # Setting these to a non-empty value makes autoconf skip pkg-config.
        DBUSMENUDUMPER_CFLAGS: " "
        DBUSMENUDUMPER_LIBS: " "
        HAVE_VALGRIND_FALSE: "#"
        HAVE_VALGRIND_TRUE: ""
    build-commands:
      - ./configure --prefix=/app --with-gtk=3 --disable-tests --disable-gtk-doc
          --disable-introspection --disable-vala
      - make -j$(nproc) -C libdbusmenu-glib
      - make install -C libdbusmenu-glib
      - make -j$(nproc) -C libdbusmenu-gtk
      - make install -C libdbusmenu-gtk
    sources:
      - type: archive
        url: https://launchpad.net/libdbusmenu/16.04/16.04.0/+download/libdbusmenu-16.04.0.tar.gz
        sha256: b9cc4a2acd74509435892823607d966d424bd9ad5d0b00938f27240a1bfa878a

  - name: libayatana-indicator
    buildsystem: cmake-ninja
    config-opts:
      - -DFLAVOUR_GTK3=ON
      - -DENABLE_BINDINGS_MONO=OFF
      - -DENABLE_BINDINGS_VALA=OFF
      - -DENABLE_IDO=OFF
    sources:
      - type: archive
        url: https://github.com/AyatanaIndicators/libayatana-indicator/archive/refs/tags/0.9.4.tar.gz
        sha256: a18d3c682e29afd77db24366f8475b26bda22b0e16ff569a2ec71cd6eb4eac95

  - name: libayatana-appindicator
    buildsystem: cmake-ninja
    config-opts:
      - -DFLAVOUR_GTK3=ON
      - -DENABLE_BINDINGS_MONO=OFF
      - -DENABLE_BINDINGS_VALA=OFF
      - -DENABLE_IDO=OFF
    sources:
      - type: archive
        url: https://github.com/AyatanaIndicators/libayatana-appindicator/archive/refs/tags/0.5.92.tar.gz
        sha256: adedcf160dae7547971d475b42062cab278d54ec075537e6958ffdbf2d996857

  # ── Node SDK ──────────────────────────────────────────────────────────────────
  - name: node
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/node22/install-sdk.sh

  - name: zerowhats
    buildsystem: simple
    sources:
      # Local source — for testing only, not for Flathub submission.
      - type: dir
        path: ../../..

      # Offline npm cache (relative to this manifest file).
      - ../node-sources.json

      # Offline Cargo vendor (relative to this manifest file).
      - ../cargo-sources.json

    build-commands:
      # ── Node: install frontend deps from offline cache ────────────────────
      - bash flatpak-node/setup_sdk_node_headers.sh
      - npm install --offline --legacy-peer-deps

      # ── Frontend: build the Vite/Preact app (produces dist/) ─────────────
      - npm run build

      # ── Rust: build the Tauri binary using vendored crates ────────────────
      - |
        cat > cargo/config.toml <<'EOF'
        [source.crates-io]
        replace-with = "vendored-sources"

        [source.vendored-sources]
        directory = "/run/build/zerowhats/cargo/vendor"
        EOF
      - cargo build --release --features custom-protocol --manifest-path src-tauri/Cargo.toml

      # ── Install ───────────────────────────────────────────────────────────
      - install -Dm755 src-tauri/target/release/zerowhats
          /app/bin/zerowhats
      - install -Dm644 release/linux/com.zaujulio.zerowhats.desktop
          /app/share/applications/com.zaujulio.zerowhats.desktop
      - install -Dm644 release/linux/com.zaujulio.zerowhats.metainfo.xml
          /app/share/metainfo/com.zaujulio.zerowhats.metainfo.xml
      - |
        for size in 32 64 128; do
          install -Dm644 "src-tauri/icons/${size}x${size}.png" \
            "/app/share/icons/hicolor/${size}x${size}/apps/com.zaujulio.zerowhats.png"
        done
      - install -Dm644 src-tauri/icons/128x128@2x.png
          /app/share/icons/hicolor/256x256@2/apps/com.zaujulio.zerowhats.png
