id: com.zaujulio.zerowhats
runtime: org.gnome.Platform
runtime-version: "47"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node22
command: zerowhats
separate-locales: false

finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --socket=pulseaudio
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=xdg-download

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node22/bin
  env:
    CARGO_HOME: /run/build/zerowhats/cargo
    npm_config_cache: /run/build/zerowhats/flatpak-node/npm-cache
    XDG_CACHE_HOME: /run/build/zerowhats/flatpak-node/cache

modules:
  # Install Node SDK outside the build sandbox so npm is accessible at install
  # time (flatpak-builder copies it to /app/node, accessible at runtime too).
  - name: node
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/node22/install-sdk.sh

  - name: zerowhats
    buildsystem: simple
    sources:
      - type: dir
        path: ../..

      # Offline npm cache — generated by flatpak-node-generator.
      # Regenerate with:
      #   python3 -m flatpak_node_generator npm package-lock.json \
      #     -o release/flatpak/node-sources.json
      - node-sources.json

      # Offline Cargo vendor — generated by flatpak-cargo-generator.
      # Regenerate with:
      #   flatpak-cargo-generator src-tauri/Cargo.lock \
      #     -o release/flatpak/cargo-sources.json
      - cargo-sources.json

    build-commands:
      # ── Node: install frontend deps from offline cache ────────────────────
      - bash flatpak-node/setup_sdk_node_headers.sh
      - npm install --offline --legacy-peer-deps

      # ── Frontend: build the Vite/Preact app (produces dist/) ─────────────
      - npm run build

      # ── Rust: build the Tauri binary using vendored crates ────────────────
      - |
        cat > cargo/config.toml <<'EOF'
        [source.crates-io]
        replace-with = "vendored-sources"

        [source.vendored-sources]
        directory = "/run/build/zerowhats/cargo/vendor"
        EOF
      - cargo build --release --manifest-path src-tauri/Cargo.toml

      # ── Install ───────────────────────────────────────────────────────────
      - install -Dm755 src-tauri/target/release/zerowhats
          /app/bin/zerowhats
      - install -Dm644 release/linux/com.zaujulio.zerowhats.desktop
          /app/share/applications/com.zaujulio.zerowhats.desktop
      - install -Dm644 release/linux/com.zaujulio.zerowhats.metainfo.xml
          /app/share/metainfo/com.zaujulio.zerowhats.metainfo.xml
      - |
        for size in 32 64 128; do
          install -Dm644 "src-tauri/icons/${size}x${size}.png" \
            "/app/share/icons/hicolor/${size}x${size}/apps/com.zaujulio.zerowhats.png"
        done
      - install -Dm644 src-tauri/icons/128x128@2x.png
          /app/share/icons/hicolor/256x256@2/apps/com.zaujulio.zerowhats.png
