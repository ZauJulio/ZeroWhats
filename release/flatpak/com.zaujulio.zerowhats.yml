id: com.zaujulio.zerowhats
runtime: org.gnome.Platform
runtime-version: "48"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node22
command: zerowhats
separate-locales: false

finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --socket=pulseaudio
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=xdg-download

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node22/bin
  env:
    CARGO_HOME: /run/build/zerowhats/cargo
    npm_config_cache: /run/build/zerowhats/flatpak-node/npm-cache
    XDG_CACHE_HOME: /run/build/zerowhats/flatpak-node/cache

modules:
  # ── Tray icon runtime dependencies ───────────────────────────────────────────
  # intltool is not in the GNOME SDK path; build it first so libdbusmenu
  # configure can find intltool-update.
  - name: intltool
    buildsystem: autotools
    sources:
      - type: archive
        url: https://launchpad.net/intltool/trunk/0.51.0/+download/intltool-0.51.0.tar.gz
        sha256: 67c74d94196b153b774ab9f89b2fa6c6ba79352407037c8c14d5aeb334e959cd

  - name: libdbusmenu
    buildsystem: autotools
    build-options:
      cflags: "-Wno-error"
    config-opts:
      - --with-gtk=3
      - --disable-tests
      - --disable-gtk-doc
      - --disable-dump-objects
      - --disable-introspection
      - --disable-vala
    sources:
      - type: archive
        url: https://launchpad.net/libdbusmenu/16.04/16.04.0/+download/libdbusmenu-16.04.0.tar.gz
        sha256: b9cc4a2acd74509435892823607d966d424bd9ad5d0b00938f27240a1bfa878a

  - name: libayatana-indicator
    buildsystem: cmake-ninja
    config-opts:
      - -DFLAVOUR_GTK3=ON
      - -DENABLE_BINDINGS_MONO=OFF
      - -DENABLE_BINDINGS_VALA=OFF
      - -DENABLE_IDO=OFF
    sources:
      - type: archive
        url: https://github.com/AyatanaIndicators/libayatana-indicator/archive/refs/tags/0.9.4.tar.gz
        sha256: a18d3c682e29afd77db24366f8475b26bda22b0e16ff569a2ec71cd6eb4eac95

  - name: libayatana-appindicator
    buildsystem: cmake-ninja
    config-opts:
      - -DFLAVOUR_GTK3=ON
      - -DENABLE_BINDINGS_MONO=OFF
      - -DENABLE_BINDINGS_VALA=OFF
      - -DENABLE_IDO=OFF
    sources:
      - type: archive
        url: https://github.com/AyatanaIndicators/libayatana-appindicator/archive/refs/tags/0.5.92.tar.gz
        sha256: adedcf160dae7547971d475b42062cab278d54ec075537e6958ffdbf2d996857

  # ── Node SDK ──────────────────────────────────────────────────────────────────
  # Install Node SDK outside the build sandbox so npm is accessible at install
  # time (flatpak-builder copies it to /app/node, accessible at runtime too).
  - name: node
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/node22/install-sdk.sh

  - name: zerowhats
    buildsystem: simple
    sources:
      - type: dir
        path: ../..

      # Offline npm cache — generated by flatpak-node-generator.
      # Regenerate with:
      #   python3 -m flatpak_node_generator npm package-lock.json \
      #     -o release/flatpak/node-sources.json
      - node-sources.json

      # Offline Cargo vendor — generated by flatpak-cargo-generator.
      # Regenerate with:
      #   flatpak-cargo-generator src-tauri/Cargo.lock \
      #     -o release/flatpak/cargo-sources.json
      - cargo-sources.json

    build-commands:
      # ── Node: install frontend deps from offline cache ────────────────────
      - bash flatpak-node/setup_sdk_node_headers.sh
      - npm install --offline --legacy-peer-deps

      # ── Frontend: build the Vite/Preact app (produces dist/) ─────────────
      - npm run build

      # ── Rust: build the Tauri binary using vendored crates ────────────────
      - |
        cat > cargo/config.toml <<'EOF'
        [source.crates-io]
        replace-with = "vendored-sources"

        [source.vendored-sources]
        directory = "/run/build/zerowhats/cargo/vendor"
        EOF
      - cargo build --release --manifest-path src-tauri/Cargo.toml

      # ── Install ───────────────────────────────────────────────────────────
      - install -Dm755 src-tauri/target/release/zerowhats
          /app/bin/zerowhats
      - install -Dm644 release/linux/com.zaujulio.zerowhats.desktop
          /app/share/applications/com.zaujulio.zerowhats.desktop
      - install -Dm644 release/linux/com.zaujulio.zerowhats.metainfo.xml
          /app/share/metainfo/com.zaujulio.zerowhats.metainfo.xml
      - |
        for size in 32 64 128; do
          install -Dm644 "src-tauri/icons/${size}x${size}.png" \
            "/app/share/icons/hicolor/${size}x${size}/apps/com.zaujulio.zerowhats.png"
        done
      - install -Dm644 src-tauri/icons/128x128@2x.png
          /app/share/icons/hicolor/256x256@2/apps/com.zaujulio.zerowhats.png
